<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pulse</title>

  <!-- Шрифты -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="icon" href="/assets/favicon.png" />

  <style>
    body {
      touch-action: manipulation;
      margin: 0;
      padding: 0;
      overflow: hidden; /* 👈 Чтобы не было прокрутки из-за canvas */
    }
  </style>

  <!-- Рабочая версия THREE.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.min.js"></script>

  <!-- Рабочая UMD-совместимая версия GLTFLoader -->
  <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r153/examples/js/loaders/GLTFLoader.js"></script>


  <!-- Глобальная регистрация -->
  <script>
    window.THREE = window.THREE || THREE;
    window.GLTFLoader = window.GLTFLoader || GLTFLoader;
  </script>

  <!-- viewer.js (должен идти сразу после) -->
  <script src="/src/3d/viewer.js"></script>
</head>
<body>
  <div id="app">
    <main id="content" role="main" aria-live="polite">Загрузка...</main>
  </div>

  <!-- Telegram SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Основной модуль -->
  <script type="module" src="/src/script.js"></script>
</body>
</html>
