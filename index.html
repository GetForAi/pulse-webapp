<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>👋 Добро пожаловать в <span class="highlight">Pulse</span></h1>
      <p id="greeting" class="subtitle">Загрузка пользователя...</p>
    </header>

    <section class="stats">
      <div class="xp-box">
        <span>🏅</span>
        <span id="xp">0 XP</span>
      </div>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <div class="progress-text">Прогресс: <span id="steps-done">0</span>/7</div>
    </section>

    <section id="progress" class="steps">Загрузка шагов...</section>

    <footer class="footer">
      <p>💡 Продвигайтесь шаг за шагом и зарабатывайте опыт</p>
    </footer>
  </div>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- Основной скрипт -->
  <script src="script.js"></script>
</body>
</html>
