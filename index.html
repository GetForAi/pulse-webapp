<!-- Попытка номер 5 -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pulse</title>

  <!-- Шрифты -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

  <!-- Стили -->
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" href="/favicon.png" />

  <style>
    body {
      margin: 0;
      padding: 0;
      touch-action: manipulation;
    }
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #111;
      padding: 10px 0;
      border-top: 1px solid var(--border);
      z-index: 10;
    }
    .bottom-nav button {
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.5rem;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s;
    }
    .bottom-nav button.active {
      color: var(--accent);
    }
    .bottom-nav button:hover {
      color: var(--accent-dark);
    }
    .bottom-nav .avatar-icon { font-size: 1.8rem; }
    .bottom-nav .achievement-icon { font-size: 1.8rem; }
    nav { display: none; }
  </style>
</head>
<body>
  <div id="app">
    <main id="content" role="main" aria-live="polite">Загрузка...</main>
  </div>

  <div id="achievement-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div class="modal-content"></div>
      <button class="modal-close">Закрыть</button>
    </div>
  </div>

  <div class="bottom-nav">
    <button data-tab="main" class="avatar-icon">👤</button>
    <button data-tab="tasks" class="task-icon">📝</button>
    <button data-tab="settings" class="settings-icon">⚙️</button>
    <button data-tab="achievements" class="achievement-icon">🏆</button>
  </div>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- 🧠 Регистрация Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(() => console.log('✅ Service Worker зарегистрирован'))
        .catch(err => console.warn('❌ Service Worker не зарегистрирован:', err));
    }
  </script>

  <!-- Главный JS-модуль -->
  <script type="module" src="/script.js"></script>
</body>
</html>
